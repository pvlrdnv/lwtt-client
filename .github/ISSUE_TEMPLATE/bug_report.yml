name: Bug report
description: Report a problem with LW TrustTunnel Client
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LW TrustTunnel Client version
      placeholder: "4.15"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 10 22H2 / Windows 11"
  - type: textarea
    id: logs
    attributes:
      label: Diagnostic log excerpt
      description: Remove credentials and private server data before posting publicly.
      render: text
